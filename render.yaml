services:
  - type: static
    name: bananacomputer
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_OLLAMA_HOST
        sync: false
      - key: VITE_OLLAMA_MODEL
        value: llama3.1:8b
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
